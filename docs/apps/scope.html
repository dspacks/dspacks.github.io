<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Research Framework</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            overflow: hidden; /* Prevent scrollbars from appearing */
        }
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        canvas {
            display: block;
        }
        #legend {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 320px;
            border: 1px solid #e0e0e0;
        }
        #legend h2 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.1em;
            color: #1a202c;
            border-bottom: 1px solid #ddd;
            padding-bottom: 8px;
        }
        #legend p {
            margin: 5px 0;
            font-size: 0.9em;
            line-height: 1.4;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .legend-shape {
            width: 16px;
            height: 16px;
            margin-right: 10px;
            border: 1px solid #555;
        }
        .sphere {
            border-radius: 50%;
            background-color: #3b82f6;
        }
        .cube {
            background-color: #ef4444;
        }
        .axis-label {
            color: #374151;
            font-size: 14px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.7);
            padding: 2px 5px;
            border-radius: 4px;
        }
        .point-label {
            color: #111827;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 5px white;
        }
        #tooltip {
            position: absolute;
            display: none;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none; /* Important */
            font-size: 0.9em;
            max-width: 250px;
            z-index: 100;
        }
        #instructions {
             position: absolute;
             bottom: 15px;
             right: 15px;
             text-align: right;
             color: #555;
             font-size: 0.8em;
             padding: 8px 12px;
             background-color: rgba(255, 255, 255, 0.8);
             border-radius: 8px;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="container">
        <div id="legend">
            <h2>Research Framework</h2>
            <p><strong>Axes:</strong></p>
            <p><strong>X (Goal):</strong> Understanding ↔ Doing</p>
            <p><strong>Y (Condition):</strong> State (SUD) ↔ Disease (HIV)</p>
            <p><strong>Z (Setting):</strong> Not in ED ↔ In ED</p>
            <br>
            <p><strong>Scale (Marker Shape):</strong></p>
            <div class="legend-item">
                <div class="legend-shape sphere"></div>
                <span>Individual / Health Promotion</span>
            </div>
            <div class="legend-item">
                <div class="legend-shape cube"></div>
                <span>Population / Longitudinal</span>
            </div>
        </div>
        <div id="tooltip"></div>
        <div id="instructions">
            <strong>Controls:</strong><br>
            Rotate: Left-click + Drag<br>
            Zoom: Scroll<br>
            Pan: Right-click + Drag
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>

    <script>
        // Core scene components
        let scene, camera, renderer, css2dRenderer, controls;
        let raycaster, mouse;
        const interactiveObjects = [];
        const tooltip = document.getElementById('tooltip');

        // Data points for research projects
        const researchProjects = [
            { name: "A", pos: { x: 0.9, y: -0.8, z: 0.9 }, scale: 'Individual' },
            { name: "B", pos: { x: -0.9, y: 0.8, z: -0.9 }, scale: 'Population' },
            { name: "C", pos: { x: -0.8, y: 0.7, z: -0.8 }, scale: 'Individual' },
            { name: "D", pos: { x: 0.8, y: 0.9, z: 0.9 }, scale: 'Population' },
            { name: "E", pos: { x: 0.1, y: -0.7, z: 0.0 }, scale: 'Population' },
            { name: "F", pos: { x: 0.9, y: -0.9, z: 0.8 }, scale: 'Individual' }
        ];

        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f2f5);

            // Camera setup
            const container = document.getElementById('container');
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(4, 4, 6);

            // WebGL Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // CSS2D Renderer for labels
            css2dRenderer = new THREE.CSS2DRenderer();
            css2dRenderer.setSize(window.innerWidth, window.innerHeight);
            css2dRenderer.domElement.style.position = 'absolute';
            css2dRenderer.domElement.style.top = '0px';
            css2dRenderer.domElement.style.pointerEvents = 'none'; // Allow clicking through to the canvas
            container.appendChild(css2dRenderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 3;
            controls.maxDistance = 20;
            controls.target.set(0, 0, 0);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7.5);
            scene.add(directionalLight);

            // Raycasting for interactivity
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            
            // Event Listeners
            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('mousemove', onMouseMove, false);

            drawCubeAndAxes();
            plotDataPoints();
            
            animate();
        }

        function drawCubeAndAxes() {
            const axisLength = 2;
            const cubeSize = axisLength * 2;

            // Bounding box (visual cube)
            const boxGeom = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
            const boxEdges = new THREE.EdgesGeometry(boxGeom);
            const boxLines = new THREE.LineSegments(boxEdges, new THREE.LineBasicMaterial({ color: 0xcccccc, transparent: true, opacity: 0.7 }));
            scene.add(boxLines);

            // Helper function to create an axis
            const createAxis = (dir, color) => {
                const material = new THREE.LineBasicMaterial({ color: color, linewidth: 2 });
                const points = [];
                points.push(new THREE.Vector3().copy(dir).multiplyScalar(-axisLength));
                points.push(new THREE.Vector3().copy(dir).multiplyScalar(axisLength));
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                return new THREE.Line(geometry, material);
            };

            // Create axes
            const xAxis = createAxis(new THREE.Vector3(1, 0, 0), 0x333333);
            const yAxis = createAxis(new THREE.Vector3(0, 1, 0), 0x333333);
            const zAxis = createAxis(new THREE.Vector3(0, 0, 1), 0x333333);
            scene.add(xAxis, yAxis, zAxis);
            
            // Helper function to create a label
            const createLabel = (text, position) => {
                const div = document.createElement('div');
                div.className = 'axis-label';
                div.textContent = text;
                const label = new THREE.CSS2DObject(div);
                label.position.copy(position);
                return label;
            };

            // Add axis labels
            scene.add(createLabel('Doing', new THREE.Vector3(axisLength + 0.3, 0, 0)));
            scene.add(createLabel('Understanding', new THREE.Vector3(-axisLength - 0.7, 0, 0)));
            scene.add(createLabel('Disease (HIV)', new THREE.Vector3(0, axisLength + 0.3, 0)));
            scene.add(createLabel('State (SUD)', new THREE.Vector3(0, -axisLength - 0.3, 0)));
            scene.add(createLabel('In ED', new THREE.Vector3(0, 0, axisLength + 0.3)));
            scene.add(createLabel('Not in ED', new THREE.Vector3(0, 0, -axisLength - 0.5)));
        }
        
        function plotDataPoints() {
            const axisLength = 2; // Should match axis length in drawCubeAndAxes
            
            researchProjects.forEach(project => {
                let geometry, material;
                const position = new THREE.Vector3(
                    project.pos.x * axisLength, 
                    project.pos.y * axisLength, 
                    project.pos.z * axisLength
                );

                if (project.scale === 'Individual') {
                    geometry = new THREE.SphereGeometry(0.1, 32, 32);
                    material = new THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.5 });
                } else { // Population
                    geometry = new THREE.BoxGeometry(0.18, 0.18, 0.18);
                    material = new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.5 });
                }

                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.copy(position);
                
                // Attach data to the mesh for raycasting
                mesh.userData = { name: project.name };
                
                scene.add(mesh);
                interactiveObjects.push(mesh);
                
                // Add point label (A, B, C...)
                const labelDiv = document.createElement('div');
                labelDiv.className = 'point-label';
                labelDiv.textContent = project.name.substring(0, 1);
                const pointLabel = new THREE.CSS2DObject(labelDiv);
                pointLabel.position.copy(position);
                pointLabel.position.y += 0.2; // Offset label slightly above the point
                scene.add(pointLabel);
            });
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            css2dRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            // Update the mouse position for raycasting
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Position the tooltip
            tooltip.style.left = `${event.clientX + 15}px`;
            tooltip.style.top = `${event.clientY + 15}px`;
        }

        function checkIntersections() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactiveObjects);

            if (intersects.length > 0) {
                // If the tooltip is not already visible with the same content
                const objectName = intersects[0].object.userData.name;
                if (tooltip.style.display !== 'block' || tooltip.innerHTML !== objectName) {
                    tooltip.innerHTML = objectName;
                    tooltip.style.display = 'block';
                    document.body.style.cursor = 'pointer';
                }
            } else {
                if (tooltip.style.display !== 'none') {
                    tooltip.style.display = 'none';
                    document.body.style.cursor = 'default';
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            checkIntersections();
            renderer.render(scene, camera);
            css2dRenderer.render(scene, camera);
        }

        // Start the application
        init();

    </script>
</body>
</html>
